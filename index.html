<!DOCTYPE html>
<html lang="cs" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DroXXom| Portfolio</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

  <style>
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background: linear-gradient(-45deg, #3b82f6, #6366f1, #ec4899, #22c55e);
      background-size: 400% 400%;
      animation: gradientBG 18s ease infinite;
      opacity: 0.15;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .logo {
      width: 120px;
      margin-bottom: 20px;
      transition: 0.3s;
      filter: drop-shadow(0 0 10px #3b82f6);
    }

    .logo:hover {
      transform: scale(1.1) rotate(5deg);
      filter: drop-shadow(0 0 20px #6366f1);
    }

    .cursor {
      width: 20px;
      height: 20px;
      border: 2px solid #3b82f6;
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      color: white;
    }

    .loader-text {
      font-size: 32px;
      font-weight: bold;
      animation: spinText 2s linear infinite;
    }

    @keyframes spinText {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .progress-bar {
      width: 200px;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 999px;
      margin-top: 20px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, #3b82f6, #6366f1);
      animation: loadProgress 5s linear forwards;
    }

    @keyframes loadProgress {
      from { width: 0%; }
      to { width: 100%; }
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 16px;
      max-width: 500px;
    }
  </style>
</head>

<body class="bg-white text-gray-800 dark:bg-gray-900 dark:text-gray-100">


<div id="loader">
  <div class="loader-text">Dominik Z*****</div>
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>
</div>

<div class="cursor" id="cursor"></div>
<div id="particles-js" class="fixed inset-0 -z-10"></div>

<header class="fixed w-full bg-white/70 dark:bg-gray-900/70 backdrop-blur-xl z-50">
  <div class="max-w-6xl mx-auto flex justify-between p-4">
    <h1 class="font-bold">Dominik Z*****</h1>
    <button onclick="toggleDark()">🌙</button>
  </div>
</header>


<section class="min-h-screen flex flex-col justify-center items-center text-center">

<img 
  src="logo.png" 
  alt="logo"
  class="logo"
  onerror="this.src='https://via.placeholder.com/150'"
>

  <h2 class="text-5xl font-bold" data-aos="fade-up">
    Ahoj👋, jsem DroXXom
  </h2>

  <p class="mt-4 opacity-70" data-aos="fade-up">
    Weby • Programování • Technologie
  </p>
</section>


<section id="projects" class="max-w-6xl mx-auto py-24 px-6">
  <h3 class="text-3xl mb-10">Projekty</h3>
  <div id="projectsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
</section>

  
<section id="contact" class="max-w-xl mx-auto py-24 px-6">
  <h3 class="text-2xl mb-6 text-center">📩 Kontaktuj mě</h3>

  <form onsubmit="sendEmail(event)" class="space-y-4">
    <input id="name" type="text" placeholder="Tvé jméno" class="w-full p-3 rounded-xl text-black" required />
    <input id="email" type="email" placeholder="Tvůj email" class="w-full p-3 rounded-xl text-black" required />
    <textarea id="message" placeholder="Tvoje zpráva..." class="w-full p-3 rounded-xl text-black h-32" required></textarea>

    <button id="submitBtn" type="submit" class="w-full px-6 py-3 bg-blue-500 text-white rounded-xl hover:scale-105 transition">
      Odeslat
    </button>
  </form>

  <p id="formStatus" class="mt-6 text-center opacity-80"></p>
</section>

<script>

window.addEventListener('load', () => {
  setTimeout(() => {
    const loader = document.getElementById('loader')
    loader.style.opacity = '0'
    loader.style.transition = 'opacity 1s ease'

    setTimeout(() => {
      loader.style.display = 'none'
    }, 1000)

  }, 5000)
})

  
function toggleDark() {
  const html = document.documentElement
  html.classList.toggle('dark')
  localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light')
}
if (localStorage.getItem('theme') === 'dark') {
  document.documentElement.classList.add('dark')
}

  
const cursor = document.getElementById('cursor')
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px'
  cursor.style.top = e.clientY + 'px'
})


fetch('https://api.github.com/users/droxxom/repos')
.then(res => res.json())
.then(data => {
  if (!Array.isArray(data)) return

  const grid = document.getElementById('projectsGrid')

  data.slice(0,6).forEach(repo => {
    const img = `https://opengraph.githubassets.com/1/${repo.full_name}`
    const fallback = 'https://picsum.photos/400/200'

    const div = document.createElement('div')
    div.className = 'group rounded-2xl overflow-hidden bg-white dark:bg-gray-800 shadow-lg cursor-pointer hover:-translate-y-2 transition'

    div.innerHTML = `
      <div class="relative overflow-hidden">
        <img src="${img}" onerror="this.src='${fallback}'"
        class="w-full h-40 object-cover group-hover:scale-110 transition duration-500" />
        
        <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center transition">
          <span class="text-white">Zobrazit detail</span>
        </div>
      </div>

      <div class="p-5">
        <h4 class="font-bold text-lg">${repo.name}</h4>
        <p class="text-sm opacity-70 mt-2">${repo.description || 'Bez popisu'}</p>

        <div class="flex justify-between mt-4 text-xs opacity-60">
          <span>⭐ ${repo.stargazers_count}</span>
          <span>${repo.language || ''}</span>
        </div>
      </div>
    `

    grid.appendChild(div)
  })
})


function sendEmail(e) {
  e.preventDefault()

  const name = document.getElementById('name').value.trim()
  const email = document.getElementById('email').value.trim()
  const message = document.getElementById('message').value.trim()
  const status = document.getElementById('formStatus')

  if (!name || !email || !message) {
    status.innerText = '❌ Vyplň všechna pole'
    return
  }

  status.innerText = '⏳ Odesílám...'

  const subject = encodeURIComponent('Zpráva od ' + name)
  const body = encodeURIComponent(`Jméno: ${name}\nEmail: ${email}\n\nZpráva:\n${message}`)

  setTimeout(() => {
    window.location.href = `mailto:domca2860@seznam.cz?subject=${subject}&body=${body}`
    status.innerText = '✅ Email otevřen'
  }, 800)
}

AOS.init()
tsParticles.load(\"particles-js\", { particles: { number: { value: 40 }, move: { speed: 1 } } })
</script>

</body>
</html>
